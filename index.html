<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Acquisition - Proxy Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0D0D0E; color: #E4E4E7; font-family: sans-serif; }
        .glass-effect { background: rgba(31, 31, 33, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .btn-primary { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); transition: all 0.2s; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-box { background: rgba(239, 68, 68, 0.1); border: 1px solid #EF4444; color: #FCA5A5; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto mt-10">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">Media Acquisition</h1>
        
        <div class="glass-effect p-6 rounded-2xl mb-4">
            <input type="text" id="urlInput" placeholder="Paste YouTube Link (Short or Long)..." class="w-full bg-[#1A1A1C] p-4 rounded-xl mb-4 border border-gray-800 focus:outline-none focus:border-blue-500" />
            <button id="fetchBtn" class="w-full btn-primary p-4 rounded-xl font-bold">Fetch Media</button>
        </div>

        <div id="debugBox" class="hidden error-box p-4 rounded-xl text-xs font-mono mb-4"></div>

        <div id="results" class="hidden glass-effect p-6 rounded-2xl">
            <h3 class="font-bold mb-2 text-green-400">✓ Success! API Data:</h3>
            <div id="apiContent" class="text-left text-xs bg-black p-4 rounded overflow-auto max-h-60 font-mono"></div>
        </div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const debugBox = document.getElementById('debugBox');
        const results = document.getElementById('results');
        const apiContent = document.getElementById('apiContent');

        const API_KEY = 'c492265c2cmsh754d15f61e31e3cp124525jsn48d5f9811479';
        const API_HOST = 'youtube-mp3-audio-video-downloader.p.rapidapi.com';

        fetchBtn.addEventListener('click', async () => {
            const url = document.getElementById('urlInput').value.trim();
            debugBox.classList.add('hidden');
            results.classList.add('hidden');
            
            if (!url) return alert("Enter a URL");
            
            fetchBtn.innerText = "Bypassing CORS...";
            fetchBtn.disabled = true;

            try {
                // Better ID Extraction (handles youtu.be and youtube.com)
                const vIdMatch = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
                if (!vIdMatch) throw new Error("Invalid YouTube URL");
                const videoId = vIdMatch[1];

                // --- THE PROXY FIX ---
                // We use a CORS proxy to wrap the request
                const proxy = "https://corsproxy.io/?"; 
                const targetUrl = `https://${API_HOST}/language_list/${videoId}?response_mode=default`;

                const response = await fetch(proxy + encodeURIComponent(targetUrl), {
                    method: 'GET',
                    headers: {
                        'x-rapidapi-key': API_KEY,
                        'x-rapidapi-host': API_HOST
                    }
                });

                if (!response.ok) {
                    const errorData = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorData}`);
                }

                const data = await response.json();

                // Show results
                results.classList.remove('hidden');
                apiContent.innerText = JSON.stringify(data, null, 2);

            } catch (err) {
                debugBox.innerText = "❌ ERROR: " + err.message;
                debugBox.classList.remove('hidden');
            } finally {
                fetchBtn.innerText = "Fetch Media";
                fetchBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
