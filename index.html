<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Acquisition - Professional Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0D0D0E; color: #E4E4E7; overflow-x: hidden; }
        .glass-effect { background: rgba(31, 31, 33, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(59, 130, 246, 0.1); }
        .glow-input:focus { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); border-color: #3B82F6; }
        .btn-primary { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); transition: all 0.2s ease; }
        .btn-primary:hover { transform: scale(1.02); }
        .gradient-text { background: linear-gradient(135deg, #3B82F6 0%, #60A5FA 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">
    <div id="app" class="container mx-auto px-4 py-8 md:py-16 max-w-7xl">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 gradient-text">Media Acquisition</h1>
            <p class="text-gray-400 text-lg">Powered by RapidAPI. Fast and secure.</p>
        </div>

        <div class="max-w-4xl mx-auto mb-12">
            <div class="glass-effect rounded-2xl p-6">
                <div class="flex flex-col md:flex-row gap-3">
                    <input type="text" id="urlInput" placeholder="Paste YouTube URL here..." class="flex-1 bg-[#1A1A1C] border border-[#1F1F21] rounded-xl px-6 py-4 text-white focus:outline-none glow-input" />
                    <button id="fetchBtn" class="btn-primary px-8 py-4 rounded-xl text-white font-medium">Fetch Media</button>
                </div>
            </div>
        </div>

        <div id="resultsContainer" class="max-w-4xl mx-auto hidden">
            <div class="glass-effect rounded-2xl p-6 text-center">
                <h3 id="videoTitle" class="text-xl font-semibold mb-4 text-white">Video Found!</h3>
                <div id="downloadLinks" class="flex flex-wrap justify-center gap-4">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const videoTitle = document.getElementById('videoTitle');
        const downloadLinks = document.getElementById('downloadLinks');

        // Your API Config
        const API_KEY = 'c492265c2cmsh754d15f61e31e3cp124525jsn48d5f9811479';
        const API_HOST = 'youtube-mp3-audio-video-downloader.p.rapidapi.com';

        fetchBtn.addEventListener('click', async () => {
            const rawUrl = urlInput.value.trim();
            if (!rawUrl) return alert("Please paste a URL!");

            fetchBtn.innerText = "Processing...";
            fetchBtn.disabled = true;

            try {
                // Step 1: Get Video ID from URL
                const videoId = extractVideoId(rawUrl);
                if (!videoId) throw new Error("Could not find Video ID in that URL.");

                // Step 2: Call the API
                const response = await fetch(`https://${API_HOST}/language_list/${videoId}?response_mode=default`, {
                    method: 'GET',
                    headers: {
                        'x-rapidapi-key': API_KEY,
                        'x-rapidapi-host': API_HOST
                    }
                });

                if (!response.ok) throw new Error("API call failed.");

                const data = await response.json();
                console.log(data); // Look at console to see what the API returns

                // Step 3: Show results
                videoTitle.innerText = "API Connected Successfully!";
                downloadLinks.innerHTML = `<p class="text-gray-400">Response received. Check console for data structure.</p>`;
                resultsContainer.classList.remove('hidden');

            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                fetchBtn.innerText = "Fetch Media";
                fetchBtn.disabled = false;
            }
        });

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
